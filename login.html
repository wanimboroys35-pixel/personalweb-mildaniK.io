<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - MDK Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { 
      background: url('images/portopolio/1.jfif');
      display:flex; align-items:center; justify-content:center; 
    }
    
.login-container::after {
  content: '';
  position: absolute;
  top:  50%;
  left: -50%;
  width: 50%;
  height: 50%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.25),
    transparent
  );
  transform: skewX(-25deg);
  transition: 0.8s;
}

.login-container:hover::after {
  left: 130%;
}

.login-container {
  background: rgba(255, 255, 255, 0.08); /* transparan kaca */
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);

  padding: 3rem 2.5rem;
  border-radius: 24px;
  max-width: 420px;
  width: 90%;
  text-align: center;

  border: 1px solid rgba(253, 6, 6, 0.983);

  box-shadow:
    0 8px 32px rgb(255, 235, 9),
    inset 0 1px 0 rgba(67, 251, 11, 0.992); /* efek kaca */
}

.login-logo { 
  width: 100px; 
  height: 100px; 
  border-radius: 50%; 
  object-fit: cover;
  margin-bottom: 1.5rem;
  border: 4px solid rgba(3, 255, 66, 0.794);
  box-shadow: 0 8px 24px rgb(54, 224, 2);
}
    h2 { color:#1e293b; font-size:2rem; margin-bottom:1rem; font-weight:600; }
    .form-group { margin-bottom:1.5rem; }
    input { 
      width:100%; padding:1.1rem 1rem; border:2px solid #e2e8f0; border-radius:12px; background:white; 
      font-size:1rem; transition:0.2s ease; 
    }
    input:focus { outline:none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    .login-btn { 
      width:100%; padding:1.2rem; background:#3b82f6; 
      color:white; border:none; border-radius:12px; font-size:1.1rem; font-weight:600; 
      cursor:pointer; transition:0.2s ease; margin-top:1rem; 
      box-shadow: 0 4px 14px rgba(59,130,246,0.3);
    }
    .login-btn:hover { 
      background:#2563eb; 
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59,130,246,0.4); 
    }
    .demo { color:rgba(255,255,255,0.8); margin-top:1rem; font-size:0.9rem; }
    .demo-creds { 
      background:#f1f5f9; padding:1rem; border-radius:12px; margin-top:1.5rem; 
      border-left: 4px solid #3b82f6;
      color: #475569;
    }
    .demo { color:#64748b; margin-top:1.5rem; font-size:0.95rem; }
    .demo a { color:#3b82f6; text-decoration:none; font-weight:500; }
    .demo a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <br>
  <br>
  
  <div class="login-container">
<img src="images/profil.jfif" alt="MDK Logo" class="login-logo">
    <h2>🔐 Admin Login</h2>
<p style="color:#475569; margin-bottom:2rem; font-size:1.05rem;">Login untuk mengelola portfolio</p>
    
    <form id="loginForm">
      <div class="form-group">
        <input type="text" id="username" placeholder="Username" required>
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit" class="login-btn">Masuk Admin</button>
    </form>
    
    <!-- <div class="demo-creds">
      <strong>Demo:</strong> admin / mil123
    </div> -->
    <p class="demo"><a href="index.html" style="color:#38bdf8;">← Kembali ke Portfolio</a></p>
  </div>

  <script>
    // Simple client-side admin auth (demo)
    const ADMIN_CREDENTIALS = { username: 'admin', password: 'mil123' };
    
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
        sessionStorage.setItem('isAdmin', 'true');
        sessionStorage.setItem('adminUsername', username);
        window.location.href = 'admin.html';
      } else {
        alert('❌ Username atau password salah!');
      }
    });
    
    // Auto-redirect if already logged in
    if (sessionStorage.getItem('isAdmin') === 'true') {
      window.location.href = 'admin.html';
    }
  </script>
</body>
</html>
