<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;display:flex}

/* sidebar */
.sidebar{
  width:250px;
  background:#1e3a8a;
  height:100vh;
  padding:20px;
}

.sidebar h2{text-align:center}

.sidebar a{
  display:block;
  margin:10px 0;
  color:white;
  text-decoration:none;
}

/* main */
.main{
  flex:1;
  padding:20px;
}

.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:50px;
  border-radius:50%;
}

.upload{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>MDK</h2>
  <a href="#">Dashboard</a>
  <a href="index.html">Lihat Web</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<div class="profile">
  <img src="https://i.pravatar.cc/100">
  <div>
    <h3>Mildani Kogoya</h3>
    <small>Fotografer Papua</small>
  </div>
</div>

<div class="upload">
  <h2>Upload</h2>

  <input type="file" id="file"><br><br>
  <textarea id="desc" placeholder="Deskripsi"></textarea><br><br>

  <button onclick="upload()">Upload</button>
</div>

</div>

<script>
if(sessionStorage.getItem("admin")!=="true"){
  location="login.html";
}

const API="ISI_URL_SCRIPT";

function upload(){
  const file=document.getElementById("file").files[0];
  const desc=document.getElementById("desc").value;

  const reader=new FileReader();

  reader.onload=async function(e){

    await fetch(API,{
      method:"POST",
      body:JSON.stringify({
        image:e.target.result,
        desc:desc
      })
    });

    alert("Upload berhasil!");
  };

  reader.readAsDataURL(file);
}

function logout(){r
  sessionStorage.clear();
  location="login.html";
}
</script>

</body>
</html>
